  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #111827; color: #f1f5f9; }

    /* Noise overlay */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Markdown — high contrast on dark */
    .markdown-body { color: #e2e8f0; line-height: 1.75; }
    .markdown-body h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 700; margin: 1.5rem 0 0.75rem; color: #fbbf24; letter-spacing: -0.02em; }
    .markdown-body h2 { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #fcd34d; border-bottom: 1px solid rgba(253,211,77,0.2); padding-bottom: 0.5rem; }
    .markdown-body h3 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.25rem; color: #f8fafc; }
    .markdown-body p { margin: 0.5rem 0; font-size: 0.9rem; color: #e2e8f0; }
    .markdown-body ul, .markdown-body ol { margin: 0.5rem 0 0.5rem 1.25rem; font-size: 0.9rem; color: #e2e8f0; }
    .markdown-body li { margin: 0.3rem 0; }
    .markdown-body li::marker { color: #fbbf24; }
    .markdown-body strong { color: #ffffff; font-weight: 600; }
    .markdown-body blockquote { border-left: 3px solid #fbbf24; padding: 0.75rem 1rem; margin: 0.75rem 0; background: rgba(251,191,36,0.08); border-radius: 0 0.5rem 0.5rem 0; color: #f1f5f9; }

    @media (min-width: 640px) { .markdown-body table { display: table; } }
    .markdown-body th { background: rgba(251,191,36,0.12); padding: 0.6rem 0.75rem; text-align: left; font-weight: 600; color: #fcd34d; border: 1px solid rgba(148,163,184,0.15); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .markdown-body td { padding: 0.6rem 0.75rem; border: 1px solid rgba(148,163,184,0.12); color: #e2e8f0; }
    .markdown-body tr:hover td { background: rgba(251,191,36,0.05); }
    .markdown-body code { background: rgba(148,163,184,0.15); padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.82em; font-family: 'JetBrains Mono', monospace; color: #fcd34d; }
    .markdown-body pre { background: #1e293b; border: 1px solid rgba(148,163,184,0.15); color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
    .markdown-body pre code { background: none; padding: 0; color: inherit; }
    .markdown-body hr { border: none; border-top: 1px solid rgba(148,163,184,0.15); margin: 1.5rem 0; }
    .markdown-body a { color: #fbbf24; text-decoration: underline; text-underline-offset: 2px; }

    /* Glow animation for the generate button */
    @keyframes forgeGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(245,158,11,0.3), 0 0 40px rgba(245,158,11,0.1); }
      50% { box-shadow: 0 0 30px rgba(245,158,11,0.5), 0 0 60px rgba(245,158,11,0.2); }
    }
    .forge-glow { animation: forgeGlow 2s ease-in-out infinite; }

    /* Pulse for processing */
    @keyframes forgePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .forge-pulse { animation: forgePulse 1.5s ease-in-out infinite; }

    /* Forging flame */
    .forge-flame { position: relative; display: inline-block; width: 21px; height: 27px; flex-shrink: 0; }
    .forge-flame::before, .forge-flame::after {
      content: ''; position: absolute; bottom: 0; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    }
    .forge-flame::before {
      left: 3px; width: 15px; height: 21px;
      background: linear-gradient(to top, #f59e0b, #ef4444 40%, rgba(239,68,68,0));
      animation: flameOuter 0.8s ease-in-out infinite alternate;
    }
    .forge-flame::after {
      left: 6px; width: 9px; height: 14px;
      background: linear-gradient(to top, #fde68a, #fbbf24 60%, rgba(251,191,36,0));
      animation: flameInner 0.6s ease-in-out infinite alternate;
    }
    @keyframes flameOuter {
      0% { height: 21px; transform: scaleX(1) rotate(-2deg); opacity: 0.9; }
      100% { height: 24px; transform: scaleX(0.85) rotate(2deg); opacity: 1; }
    }
    @keyframes flameInner {
      0% { height: 14px; transform: scaleX(1) rotate(1deg); }
      100% { height: 17px; transform: scaleX(0.8) rotate(-1deg); }
    }

    /* Stage connector line */
    .stage-connector { position: relative; }
    .stage-connector::before {
      content: ''; position: absolute; left: 19px; top: -4px; width: 2px; height: calc(100% + 8px);
      background: linear-gradient(to bottom, rgba(148,163,184,0.25), rgba(148,163,184,0.08));
    }
    .stage-connector:first-child::before { top: 50%; height: 50%; }
    .stage-connector:last-child::before { height: 50%; }

    /* Fade-in animation */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease-out forwards; }

    /* Glass panel */
    .glass { background: rgba(30,41,59,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(148,163,184,0.12); }

    /* Print Styles */

    /* ── Forge Logo ──────────────────────────────────── */
    function ForgeLogo() {
      return (
        <div className="relative w-10 h-10 flex items-center justify-center">

    /* ── Markdown Renderer ───────────────────────────── */
    function MarkdownView({ content }) {
      const html = useMemo(() => {
        if (!content) return "";
        return marked.parse(content, { breaks: true, gfm: true });
      }, [content]);
      return (
        <div className="markdown-body"

    /* ── Print Utility ───────────────────────────────── */
    function openPrintWindow(title, subtitle, htmlContent) {
      const printWin = window.open("", "_blank", "width=900,height=700");
      printWin.document.write(`<!DOCTYPE html>

</head>

    /* ── PDF Generation Utility ────────────────────────── */
    async function generatePDF(title, htmlContent, filename) {
      const { jsPDF } = window.jspdf;
      const container = document.createElement("div");
      container.style.cssText = "position:fixed;left:-9999px;top:0;width:800px;background:white;color:#1e293b;padding:40px;font-family:'DM Sans',sans-serif;";
      container.innerHTML = htmlContent;
      document.body.appendChild(container);
      try {
        const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 10;
        const contentWidth = pageWidth - margin * 2;
        const imgHeight = (canvas.height * contentWidth) / canvas.width;
        let position = 0;
        const usableHeight = pageHeight - margin * 2;
        while (position < imgHeight) {
          if (position > 0) pdf.addPage();
          pdf.addImage(imgData, "PNG", margin, margin - position, contentWidth, imgHeight);
          // Footer
          pdf.setFontSize(7);
          pdf.setTextColor(148, 163, 184);
          pdf.text(`Product Forge AI  //  ${title}`, margin, pageHeight - 5);
          pdf.text(`Page ${pdf.internal.getNumberOfPages()}`, pageWidth - margin - 10, pageHeight - 5);
          position += usableHeight;
        }
        pdf.save(filename);
      } finally {
        document.body.removeChild(container);
      }
    }

    /* ── Main App ────────────────────────────────────── */
    function AIWorkflowApp() {
      const [activeStep, setActiveStep] = useState(1);
      const [viewStep, setViewStep] = useState(1);
      const [isProcessing, setIsProcessing] = useState(false);
      const [error, setError] = useState("");
      const [runId, setRunId] = useState(null);
      const [showRuns, setShowRuns] = useState(false);
      const [outputs, setOutputs] = useState({
        intake: "", refine: "", prd: "", techspec: "", estimate: "", proto_prompt: "", build: ""
      });
      const [mobileMenu, setMobileMenu] = useState(false);
      const [mobileSidebar, setMobileSidebar] = useState(false);
      const [clarifyMode, setClarifyMode] = useState(null); // { stage, questions, output }
      const [clarifyInput, setClarifyInput] = useState("");
      const [clarifyProcessing, setClarifyProcessing] = useState(false);
      const [staleStages, setStaleStages] = useState(new Set());
      const [editMode, setEditMode] = useState(null); // { stageKey, feedback }
      const [editProcessing, setEditProcessing] = useState(false);
      const [manualEdit, setManualEdit] = useState(null); // { stageKey, text }
      const [jellyfishContext, setJellyfishContext] = useState(null); // formatted engineering data from Jellyfish
      const [autoPilot, setAutoPilot] = useState(false);
      const autoPilotRef = useRef(false);

      const currentStage = STAGES[viewStep - 1];

      function detectClarifyingQuestions(text) {
        if (!text) return null;
        const qSection = text.match(/##\s*Clarifying Questions[\s\S]*?(?=\n##\s|$)/i);
        if (qSection) return qSection[0];
        const lines = text.split("\n");
        const qLines = lines.filter(l => l.trim().match(/^\d+[\.\)]\s.*\?$/) || l.trim().match(/^[-*]\s.*\?$/));
        if (qLines.length >= 2) return qLines.join("\n");
        return null;
      }

      async function callAPI(stage, inputText) {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ stage, input_text: inputText }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.error || err.detail || "API request failed");
        }

        const contentType = res.headers.get("content-type") || "";

        // Handle SSE streaming response (used for Sonnet / large token stages)
        if (contentType.includes("text/event-stream")) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullText = "";
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              try {
                const parsed = JSON.parse(line.slice(6));
                if (parsed.error) throw new Error(parsed.error);
                if (parsed.delta) fullText += parsed.delta;
                if (parsed.output) fullText = parsed.output;
              } catch (e) {
                if (e.message && !e.message.includes("JSON")) throw e;
              }
            }
          }
          if (!fullText) throw new Error("Empty response from API");
          return fullText;
        }

        // Standard JSON response (Haiku stages)
        return (await res.json()).output;
      }

      async function saveToDB(updates) {
        try {
          if (!runId) {
            const res = await fetch("/api/pipeline", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ intake: outputs.intake }) });
            const data = await res.json();
            setRunId(data.id);
            return data.id;
          } else {
            await fetch(`/api/pipeline?id=${runId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updates) });
            return runId;
          }
        } catch (e) { console.error("Save error:", e); }
      }

      async function loadRun(id) {
        try {
          const res = await fetch(`/api/pipeline?id=${id}`);
          const run = await res.json();
          if (!run) return;
          setRunId(run.id);
          setOutputs({ intake: run.intake || "", refine: run.refined || "", prd: run.prd || "", techspec: run.tech_spec || "", estimate: run.estimate || "", proto_prompt: run.proto_prompt || "", build: run.build_status || "" });
          setStaleStages(new Set());
          setActiveStep(run.current_stage || 1);
          setViewStep(run.current_stage || 1);
          setShowRuns(false);
        } catch (e) { setError("Failed to load run"); }
      }

      async function generateNextStep() {
        setError("");
        setIsProcessing(true);
        try {
          const estimateInput = jellyfishContext
            ? `${outputs.techspec}\n\n---\n\n${jellyfishContext}\n\nIMPORTANT: The Jellyfish data above contains REAL engineering metrics from this organization. Use this data to calibrate your estimates — reference actual team velocity, allocation patterns, and productivity metrics instead of generic industry benchmarks where applicable. Clearly note where you are using Jellyfish data vs. external benchmarks.`
            : outputs.techspec;

          const stageMap = {
            1: { apiStage: "refine", input: outputs.intake },
            2: { apiStage: "prd", input: outputs.refine },
            3: { apiStage: "techspec", input: outputs.prd },
            4: { apiStage: "estimate", input: estimateInput },
            5: { apiStage: "proto_prompt", input: `## Product Requirements Document\n\n${outputs.prd}\n\n## Technical Specification\n\n${outputs.techspec}\n\n## Cost & Timeline Estimate\n\n${outputs.estimate}` },
          };

          // Stage 7 (build) is special — no API call, auto-advance
          if (activeStep === 6) {
            setOutputs(prev => ({ ...prev, build: "ready" }));
            setActiveStep(7);
            setViewStep(7);
            if (runId) await saveToDB({ build_status: "ready", current_stage: 7 });
            return;
          }

          const config = stageMap[activeStep];
          if (!config) return;
          const result = await callAPI(config.apiStage, config.input);
          const nextKey = STAGES[activeStep].key;
          setOutputs(prev => ({ ...prev, [nextKey]: result }));

          // Check for clarifying questions
          const questions = detectClarifyingQuestions(result);
          if (questions) {
            setClarifyMode({ stageKey: nextKey, apiStage: config.apiStage, questions, originalInput: config.input });
          }

          const newStep = activeStep + 1;
          setActiveStep(newStep);
          setViewStep(newStep);
          const dbUpdates = { [DB_KEY_MAP[nextKey]]: result, current_stage: newStep };
          if (newStep === TOTAL_STAGES) dbUpdates.status = "completed";
          if (activeStep === 1) {
            const res = await fetch("/api/pipeline", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ intake: outputs.intake }) });
            const data = await res.json();
            setRunId(data.id);
            await fetch(`/api/pipeline?id=${data.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(dbUpdates) });
          } else { await saveToDB(dbUpdates); }
        } catch (e) { setError(e.message); } finally { setIsProcessing(false); }
      }

      async function submitClarification(userAnswers) {
        if (!clarifyMode) return;
        setClarifyProcessing(true);
        setError("");
        try {
          const followUp = `Here is the original input:\n\n${clarifyMode.originalInput}\n\nYou asked clarifying questions. Here are the answers:\n\n${userAnswers}\n\nPlease regenerate your full output incorporating these answers. Do not ask the same questions again.`;
          const result = await callAPI(clarifyMode.apiStage, followUp);
          setOutputs(prev => ({ ...prev, [clarifyMode.stageKey]: result }));
          setClarifyMode(null);
          setClarifyInput("");
          // Update DB
          if (runId) {
            await fetch(`/api/pipeline?id=${runId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ [DB_KEY_MAP[clarifyMode.stageKey]]: result }),
            });
          }
        } catch (e) { setError(e.message); } finally { setClarifyProcessing(false); }
      }

      async function answerForMe() {
        if (!clarifyMode) return;
        setClarifyProcessing(true);
        setError("");
        try {
          const autoPrompt = `Here is the original input:\n\n${clarifyMode.originalInput}\n\nYou asked these clarifying questions:\n${clarifyMode.questions}\n\nPlease answer these questions yourself using your best judgment based on the domain context, industry best practices, and reasonable assumptions. Then regenerate your full output incorporating those answers. Clearly mark each assumption you made.`;
          const result = await callAPI(clarifyMode.apiStage, autoPrompt);
          setOutputs(prev => ({ ...prev, [clarifyMode.stageKey]: result }));
          setClarifyMode(null);
          setClarifyInput("");
          if (runId) {
            await fetch(`/api/pipeline?id=${runId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ [DB_KEY_MAP[clarifyMode.stageKey]]: result }),
            });
          }
        } catch (e) { setError(e.message); } finally { setClarifyProcessing(false); }
      }

      async function regenerateStage(stageKey, feedback) {
        setEditProcessing(true);
        setError("");
        try {
          const stageIdx = STAGES.findIndex(s => s.key === stageKey);
          const stage = STAGES[stageIdx];
          // Find the API stage and previous input
          const apiStageMap = { refine: "refine", prd: "prd", techspec: "techspec", estimate: "estimate", proto_prompt: "proto_prompt" };
          const inputMap = { refine: outputs.intake, prd: outputs.refine, techspec: outputs.prd, estimate: outputs.techspec, proto_prompt: `## PRD\n\n${outputs.prd}\n\n## Tech Spec\n\n${outputs.techspec}\n\n## Estimate\n\n${outputs.estimate}` };
          const apiStage = apiStageMap[stageKey];
          const prevInput = inputMap[stageKey];
          if (!apiStage) return;

          const composedInput = feedback
            ? `Here is the original input:\n\n${prevInput}\n\nHere is the previously generated output:\n\n${outputs[stageKey]}\n\nUser feedback for revision:\n\n${feedback}\n\nPlease regenerate the full output incorporating this feedback. Maintain the same format and depth.`
            : prevInput;

          const result = await callAPI(apiStage, composedInput);
          setOutputs(prev => ({ ...prev, [stageKey]: result }));

          // Mark all downstream stages as stale
          const downstreamKeys = STAGES.filter(s => s.id > stage.id && outputs[s.key]).map(s => s.key);
          setStaleStages(prev => {
            const next = new Set(prev);
            downstreamKeys.forEach(k => next.add(k));
            return next;
          });

          // Save to DB
          if (runId) {
            await fetch(`/api/pipeline?id=${runId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ [DB_KEY_MAP[stageKey]]: result }),
            });
          }
          setEditMode(null);
        } catch (e) { setError(e.message); } finally { setEditProcessing(false); }
      }

      async function regenerateStaleStage(stageKey) {
        // Re-run a stale stage with its (updated) upstream input, no feedback
        await regenerateStage(stageKey, null);
        setStaleStages(prev => {
          const next = new Set(prev);
          next.delete(stageKey);
          return next;
        });
      }

      async function saveManualEdit() {
        if (!manualEdit) return;
        const { stageKey, text } = manualEdit;
        setOutputs(prev => ({ ...prev, [stageKey]: text }));
        // Mark downstream stages stale
        const stageIdx = STAGES.findIndex(s => s.key === stageKey);
        const downstreamKeys = STAGES.filter(s => s.id > STAGES[stageIdx].id && outputs[s.key]).map(s => s.key);
        if (downstreamKeys.length > 0) {
          setStaleStages(prev => {
            const next = new Set(prev);
            downstreamKeys.forEach(k => next.add(k));
            return next;
          });
        }
        // Save to DB
        if (runId) {
          await fetch(`/api/pipeline?id=${runId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [DB_KEY_MAP[stageKey]]: text }),
          });
        }
        setManualEdit(null);
      }

      function cancelAutoPilot() {
        autoPilotRef.current = false;
      }

      async function runAutoPilot() {
        setError("");
        setAutoPilot(true);
        autoPilotRef.current = true;
        setIsProcessing(true);

        // Local copies to avoid stale closures
        let localOutputs = { ...outputs };
        let localActiveStep = activeStep; // should be 1
        let localRunId = runId;

        try {
          while (localActiveStep < TOTAL_STAGES && autoPilotRef.current) {
            setViewStep(localActiveStep);

            // Build stage input (mirrors generateNextStep logic)
            const localEstimateInput = jellyfishContext
              ? `${localOutputs.techspec}\n\n---\n\n${jellyfishContext}\n\nIMPORTANT: The Jellyfish data above contains REAL engineering metrics from this organization. Use this data to calibrate your estimates.`
              : localOutputs.techspec;

            const stageMap = {
              1: { apiStage: "refine", input: localOutputs.intake },
              2: { apiStage: "prd", input: localOutputs.refine },
              3: { apiStage: "techspec", input: localOutputs.prd },
              4: { apiStage: "estimate", input: localEstimateInput },
              5: { apiStage: "proto_prompt", input: `## Product Requirements Document\n\n${localOutputs.prd}\n\n## Technical Specification\n\n${localOutputs.techspec}\n\n## Cost & Timeline Estimate\n\n${localOutputs.estimate}` },
            };

            // Build stage (step 6) — auto-advance, no API call
            if (localActiveStep === 6) {
              localOutputs.build = "ready";
              setOutputs(prev => ({ ...prev, build: "ready" }));
              localActiveStep = 7;
              setActiveStep(7);
              setViewStep(7);
              if (localRunId) {
                await fetch(`/api/pipeline?id=${localRunId}`, {
                  method: "PATCH",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ build_status: "ready", current_stage: 7, status: "completed" }),
                });
              }
              break;
            }

            const config = stageMap[localActiveStep];
            if (!config) break;

            // Call API for this stage
            let result = await callAPI(config.apiStage, config.input);

            // Cancel check after API call
            if (!autoPilotRef.current) break;

            const nextKey = STAGES[localActiveStep].key;

            // Check for clarifying questions and auto-answer
            const questions = detectClarifyingQuestions(result);
            if (questions) {
              const autoPrompt = `Here is the original input:\n\n${config.input}\n\nYou asked these clarifying questions:\n${questions}\n\nPlease answer these questions yourself using your best judgment based on the domain context, industry best practices, and reasonable assumptions. Then regenerate your full output incorporating those answers. Clearly mark each assumption you made.`;
              result = await callAPI(config.apiStage, autoPrompt);
              if (!autoPilotRef.current) break;
            }

            // Update local state and React state
            localOutputs[nextKey] = result;
            setOutputs(prev => ({ ...prev, [nextKey]: result }));

            const newStep = localActiveStep + 1;
            localActiveStep = newStep;
            setActiveStep(newStep);
            setViewStep(newStep);

            // Save to DB
            const dbUpdates = { [DB_KEY_MAP[nextKey]]: result, current_stage: newStep };
            if (newStep === TOTAL_STAGES) dbUpdates.status = "completed";

            if (localActiveStep === 2 && !localRunId) {
              // First stage just completed — create the run
              const res = await fetch("/api/pipeline", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ intake: localOutputs.intake }),
              });
              const data = await res.json();
              localRunId = data.id;
              setRunId(data.id);
              await fetch(`/api/pipeline?id=${data.id}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dbUpdates),
              });
            } else if (localRunId) {
              await fetch(`/api/pipeline?id=${localRunId}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dbUpdates),
              });
            }
          }
        } catch (e) {
          setError(e.message);
        } finally {
          setIsProcessing(false);
          setAutoPilot(false);
          autoPilotRef.current = false;
        }
      }

      function resetPipeline() {
        autoPilotRef.current = false;
        setAutoPilot(false);
        setActiveStep(1); setViewStep(1); setError(""); setRunId(null); setClarifyMode(null); setClarifyInput("");
        setOutputs({ intake: "", refine: "", prd: "", techspec: "", estimate: "", proto_prompt: "", build: "" });
        setStaleStages(new Set()); setEditMode(null); setManualEdit(null); setJellyfishContext(null);
      }

      const canGenerate = viewStep === activeStep && activeStep < TOTAL_STAGES && outputs[currentStage.key].trim().length > 0;
      const progress = ((activeStep - 1) / (TOTAL_STAGES - 1)) * 100;

      return (
        <div className="min-h-screen flex flex-col">
          {/* Progress bar at very top */}
          <div className="h-[2px] bg-anvil-900 no-print">
            <div className="h-full bg-gradient-to-r from-forge-600 to-forge-400 transition-all duration-700 ease-out" style={{width: `${progress}%`}} />
          </div>

          {/* Header */}
          <header className="border-b border-anvil-700/40 no-print sticky top-0 z-40" style={{background:'rgba(17,24,39,0.92)', backdropFilter:'blur(20px)'}}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
              <div className="flex items-center gap-3 sm:gap-4">
                <ForgeLogo />
                <div>
                  <h1 className="font-display text-base sm:text-lg font-bold text-anvil-100 tracking-tight">Product Forge</h1>
                  <p className="font-display text-[9px] sm:text-[10px] text-anvil-400 tracking-widest uppercase hidden sm:block">Intake // Refine // Build</p>
                </div>
              </div>
              {/* Desktop actions */}
              <div className="hidden sm:flex items-center gap-2">
                <PrintMenu outputs={outputs} />
                <button onClick={() => setShowRuns(true)}
                  className="flex items-center gap-2 px-3 py-2 text-xs font-display font-medium text-anvil-400 border border-anvil-800 rounded-lg hover:border-anvil-600 hover:text-anvil-200 transition-all">
                  <FolderOpen size={14} /> Load
                </button>
                <button onClick={resetPipeline}
                  className="flex items-center gap-2 px-3 py-2 text-xs font-display font-medium text-anvil-400 border border-anvil-800 rounded-lg hover:border-forge-500/30 hover:text-forge-400 transition-all">
                  <RotateCcw size={14} /> New
                </button>
              </div>
              {/* Mobile menu toggle */}
              <button onClick={() => setMobileMenu(!mobileMenu)} className="sm:hidden p-2 text-anvil-400 hover:text-anvil-200 transition-colors">
                {mobileMenu ? <X size={20} /> : <Menu size={20} />}
              </button>
            </div>
            {/* Mobile dropdown */}
            {mobileMenu && (
              <div className="sm:hidden border-t border-anvil-800/50 px-4 py-3 flex flex-wrap gap-2 fade-up">
                <PrintMenu outputs={outputs} />
                <button onClick={() => { setShowRuns(true); setMobileMenu(false); }}
                  className="flex items-center gap-2 px-3 py-2 text-xs font-display font-medium text-anvil-400 border border-anvil-800 rounded-lg">
                  <FolderOpen size={14} /> Load
                </button>
                <button onClick={() => { resetPipeline(); setMobileMenu(false); }}
                  className="flex items-center gap-2 px-3 py-2 text-xs font-display font-medium text-anvil-400 border border-anvil-800 rounded-lg">
                  <RotateCcw size={14} /> New
                </button>
              </div>
            )}
          </header>

          {/* Mobile stage pills */}
          <div className="lg:hidden no-print px-4 pt-4 -mb-2">
            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              {STAGES.map(s => {
                const done = outputs[s.key] && s.id < activeStep;
                const active = s.id === activeStep;
                const viewing = s.id === viewStep;
                const stale = staleStages.has(s.key);
                const clickable = outputs[s.key] || s.id <= activeStep;
                return (
                  <button key={s.id} onClick={() => clickable && setViewStep(s.id)} disabled={!clickable}
                    className={`flex-shrink-0 flex items-center gap-1.5 px-3 py-2 rounded-full font-display text-[11px] font-semibold transition-all border ${
                      viewing ? 'border-forge-500/40 bg-forge-500/10 text-forge-400' :
                      stale ? 'border-amber-500/20 bg-amber-500/5 text-amber-500' :
                      done ? 'border-green-500/20 bg-green-500/5 text-green-500' :
                      active ? 'border-forge-500/20 text-forge-500' :
                      'border-anvil-800/30 text-anvil-400 opacity-50'
                    }`}>
                    {stale && <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>}
                    {!stale && done && <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                    <span>{s.num}</span>
                    <span className="hidden xs:inline">{s.label}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-4 sm:py-8 grid lg:grid-cols-[260px_1fr] gap-4 sm:gap-8">
            {/* Sidebar — desktop only */}
            <aside className="no-print hidden lg:block">
              <div className="font-display text-[10px] font-bold text-anvil-200 uppercase tracking-[0.2em] mb-4 pl-[38px]">Pipeline</div>
              <div className="space-y-1">
                {STAGES.map((s, i) => (
                  <StageNode key={s.id} stage={s} activeStep={activeStep} outputs={outputs}
                    onClick={(id) => setViewStep(id)} isLast={i === STAGES.length - 1} staleStages={staleStages} />
                ))}
              </div>
              {runId && (
                <div className="mt-6 ml-[38px] flex items-center gap-2 text-[11px] text-green-500/70 font-display">
                  <div className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" /> Synced
                </div>
              )}
            </aside>

            {/* Main Content */}
            <main className="space-y-6 min-w-0">
              {/* Error */}
              {error && (
                <div className="flex items-center gap-3 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm no-print fade-up">
                  <AlertCircle className="shrink-0" size={16} /> <span className="font-display text-xs">{error}</span>
                </div>
              )}

              {/* Active Stage Panel */}
              <div className="glass rounded-2xl overflow-hidden fade-up">
                {/* Stage header */}
                <div className="px-4 sm:px-6 py-4 sm:py-5 border-b border-anvil-800/30 flex items-center gap-3 sm:gap-4">
                  <div className={`w-9 h-9 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${
                    staleStages.has(currentStage.key) ? 'bg-amber-500/10 text-amber-400' : viewStep === activeStep && activeStep < TOTAL_STAGES ? 'bg-forge-500/10 text-forge-400' : outputs[currentStage.key] ? 'bg-green-500/10 text-green-400' : 'bg-anvil-800/50 text-anvil-300'
                  }`}>
                    {React.createElement(currentStage.icon)}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-3">
                      <span className="font-display text-[10px] font-bold text-anvil-400 tracking-widest">{currentStage.num}</span>
                      <h2 className="font-display font-bold text-anvil-100 tracking-tight">{currentStage.label}</h2>
                    </div>
                    <p className="text-xs text-anvil-300 mt-0.5">{currentStage.desc}</p>
                  </div>
                  {viewStep !== activeStep && (
                    <button onClick={() => setViewStep(activeStep)}
                      className="text-xs font-display text-forge-500 hover:text-forge-400 font-medium no-print transition-colors">
                      Current &rarr;
                    </button>
                  )}
                </div>

                {/* Stale warning banner */}
                {staleStages.has(currentStage.key) && (
                  <div className="mx-4 sm:mx-6 mt-4 flex items-center gap-3 p-3 bg-amber-500/10 border border-amber-500/20 rounded-lg fade-up">
                    <AlertCircle size={14} className="text-amber-400 flex-shrink-0" />
                    <span className="text-xs text-amber-300 font-display flex-1">This output was generated from earlier input and may be outdated.</span>
                    <button onClick={() => regenerateStaleStage(currentStage.key)} disabled={editProcessing}
                      className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg font-display text-xs font-medium bg-amber-500/20 text-amber-300 hover:bg-amber-500/30 transition-all disabled:opacity-50 flex-shrink-0">
                      {editProcessing ? "Regenerating..." : <><RotateCcw size={12} /> Regenerate</>}
                    </button>
                  </div>
                )}

                {/* Content */}
                <div className="p-4 sm:p-6">
                  {viewStep === 1 && activeStep === 1 ? (
                    <textarea
                      className="w-full h-56 sm:h-80 p-4 sm:p-5 bg-anvil-900/50 border border-anvil-800/50 rounded-xl text-sm text-anvil-200 resize-none focus:outline-none focus:border-forge-500/40 focus:ring-1 focus:ring-forge-500/20 transition-all placeholder:text-anvil-400 font-body"
                      placeholder={"Describe your product idea...\n\nInclude details like:\n\u2022 What problem does it solve?\n\u2022 Who is it for?\n\u2022 Key features and constraints\n\u2022 Business context and goals"}
                      value={outputs.intake}
                      onChange={e => setOutputs(prev => ({ ...prev, intake: e.target.value }))}
                    />
                  ) : currentStage.key === "build" && outputs.proto_prompt ? (
                    <BuildStagePanel
                      protoPrompt={outputs.proto_prompt}
                      buildStatus={outputs.build}
                      onMarkComplete={async () => {
                        const ts = new Date().toISOString();
                        setOutputs(prev => ({ ...prev, build: ts }));
                        if (runId) await saveToDB({ build_status: ts, status: "completed" });
                      }}
                    />
                  ) : outputs[currentStage.key] ? (
                    <div>
                      {/* Manual edit mode: raw markdown textarea */}
                      {manualEdit && manualEdit.stageKey === currentStage.key ? (
                        <div className="fade-up">
                          <div className="flex items-center gap-2 mb-3">
                            <FileText size={14} className="text-forge-400" />
                            <span className="font-display text-xs font-semibold text-forge-400">Editing {currentStage.label} — Markdown</span>
                          </div>
                          <textarea
                            className="w-full h-[400px] sm:h-[560px] p-4 sm:p-5 bg-anvil-900/50 border border-anvil-800/50 rounded-xl text-sm text-anvil-200 resize-y focus:outline-none focus:border-forge-500/40 focus:ring-1 focus:ring-forge-500/20 transition-all font-display text-[13px] leading-relaxed"
                            value={manualEdit.text}
                            onChange={e => setManualEdit(prev => ({ ...prev, text: e.target.value }))}
                          />
                          <div className="flex items-center gap-2 mt-3">
                            <button onClick={saveManualEdit}
                              className="flex items-center gap-2 px-4 py-2 rounded-lg font-display text-xs font-semibold bg-forge-500 text-anvil-950 hover:bg-forge-400 transition-all">
                              <Save size={12} /> Save Changes
                            </button>
                            <button onClick={() => setManualEdit(null)}
                              className="text-xs text-anvil-400 hover:text-anvil-200 font-display transition-colors px-3 py-2">
                              Cancel
                            </button>
                            {manualEdit.text !== outputs[currentStage.key] && (
                              <span className="text-[10px] text-amber-400 font-display ml-auto">Unsaved changes</span>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div className="w-full max-h-[400px] sm:max-h-[560px] p-4 sm:p-6 bg-anvil-900/30 border border-anvil-800/30 rounded-xl overflow-auto">
                          <MarkdownView content={outputs[currentStage.key]} />
                        </div>
                      )}
                      {/* Revise tools for any AI stage with output (not intake, not build) */}
                      {currentStage.key !== "intake" && currentStage.key !== "build" && !manualEdit && (
                        <div className="mt-3">
                          {editMode && editMode.stageKey === currentStage.key ? (
                            <div className="border border-forge-500/20 rounded-xl bg-forge-500/5 p-4 fade-up">
                              <div className="flex items-center gap-2 mb-3">
                                <Pencil size={14} className="text-forge-400" />
                                <span className="font-display text-xs font-semibold text-forge-400">Revise {currentStage.label}</span>
                              </div>
                              <textarea
                                className="w-full h-24 p-3 bg-anvil-900/60 border border-anvil-800/50 rounded-lg text-sm text-anvil-200 resize-none focus:outline-none focus:border-forge-500/40 focus:ring-1 focus:ring-forge-500/20 transition-all placeholder:text-anvil-400 font-body"
                                placeholder="What should change? (e.g., 'Make cost estimates more conservative', 'Add mobile app requirements')"
                                value={editMode.feedback}
                                onChange={e => setEditMode(prev => ({ ...prev, feedback: e.target.value }))}
                                disabled={editProcessing}
                              />
                              <div className="flex items-center gap-2 mt-3">
                                <button onClick={() => regenerateStage(currentStage.key, editMode.feedback)}
                                  disabled={!editMode.feedback.trim() || editProcessing}
                                  className={`flex items-center gap-2 px-4 py-2 rounded-lg font-display text-xs font-semibold transition-all ${
                                    editMode.feedback.trim() && !editProcessing ? "bg-forge-500 text-anvil-950 hover:bg-forge-400" : "bg-anvil-800/50 text-anvil-400 cursor-not-allowed"
                                  }`}>
                                  {editProcessing ? "Regenerating..." : <><ArrowRight size={12} /> Regenerate with Feedback</>}
                                </button>
                                <button onClick={() => setEditMode(null)} className="text-xs text-anvil-400 hover:text-anvil-200 font-display transition-colors px-3 py-2">Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div className={`flex items-center gap-3 py-2 px-1 border-t border-anvil-800/20 mt-4 flex-wrap ${autoPilot ? 'opacity-40 pointer-events-none' : ''}`}>
                              <button onClick={() => setManualEdit({ stageKey: currentStage.key, text: outputs[currentStage.key] })} disabled={autoPilot}
                                className="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-display font-medium text-anvil-300 border border-anvil-800/40 hover:border-forge-500/30 hover:text-forge-400 transition-all disabled:opacity-50">
                                <FileText size={13} /> Edit Text
                              </button>
                              <button onClick={() => setEditMode({ stageKey: currentStage.key, feedback: "" })} disabled={autoPilot}
                                className="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-display font-medium text-anvil-300 border border-anvil-800/40 hover:border-forge-500/30 hover:text-forge-400 transition-all disabled:opacity-50">
                                <Pencil size={13} /> Revise with AI
                              </button>
                              <button onClick={() => regenerateStage(currentStage.key, null)} disabled={editProcessing || autoPilot}
                                className="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-display font-medium text-anvil-300 border border-anvil-800/40 hover:border-forge-500/30 hover:text-forge-400 transition-all disabled:opacity-50">
                                <RotateCcw size={13} /> {editProcessing ? "Regenerating..." : "Regenerate"}
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="w-full h-56 sm:h-80 border border-dashed border-anvil-800/40 rounded-xl flex flex-col items-center justify-center gap-3">
                      <div className="w-12 h-12 rounded-full bg-anvil-900/50 flex items-center justify-center text-anvil-700">
                        {React.createElement(currentStage.icon, { size: 24 })}
                      </div>
                      <span className="text-sm text-anvil-400">
                        {viewStep === activeStep ? "Ready to generate" : "Not yet generated"}
                      </span>
                    </div>
                  )}
                </div>

                {/* Clarification Q&A */}
                {clarifyMode && clarifyMode.stageKey === currentStage.key && (
                  <div className="mx-4 sm:mx-6 mb-4 border border-forge-500/20 rounded-xl bg-forge-500/5 overflow-hidden fade-up">
                    <div className="px-4 sm:px-5 py-3 border-b border-forge-500/10 flex items-center gap-2">
                      <AlertCircle size={14} className="text-forge-400 flex-shrink-0" />
                      <span className="font-display text-xs font-semibold text-forge-400">Clarifying Questions</span>
                    </div>
                    <div className="px-4 sm:px-5 py-3">
                      <div className="text-xs text-anvil-300 whitespace-pre-wrap mb-3 leading-relaxed">{clarifyMode.questions}</div>
                      <textarea
                        className="w-full h-24 sm:h-28 p-3 bg-anvil-900/60 border border-anvil-800/50 rounded-lg text-sm text-anvil-200 resize-none focus:outline-none focus:border-forge-500/40 focus:ring-1 focus:ring-forge-500/20 transition-all placeholder:text-anvil-400 font-body"
                        placeholder="Type your answers here..."
                        value={clarifyInput}
                        onChange={e => setClarifyInput(e.target.value)}
                        disabled={clarifyProcessing}
                      />
                      <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-3 mt-3">
                        <button
                          onClick={() => submitClarification(clarifyInput)}
                          disabled={!clarifyInput.trim() || clarifyProcessing}
                          className={`flex items-center justify-center gap-2 px-4 py-2.5 sm:py-2 rounded-lg font-display text-xs font-semibold transition-all ${
                            clarifyInput.trim() && !clarifyProcessing
                              ? "bg-forge-500 text-anvil-950 hover:bg-forge-400"
                              : "bg-anvil-800/50 text-anvil-400 cursor-not-allowed"
                          }`}>
                          {clarifyProcessing ? "Regenerating..." : <><ArrowRight size={12} /> Submit Answers</>}
                        </button>
                        <button
                          onClick={answerForMe}
                          disabled={clarifyProcessing}
                          className="flex items-center justify-center gap-2 px-4 py-2.5 sm:py-2 rounded-lg font-display text-xs font-medium border border-anvil-700 text-anvil-400 hover:border-forge-500/30 hover:text-forge-300 transition-all disabled:opacity-50">
                          {clarifyProcessing ? "..." : <><Sparkles size={12} /> Answer for Me</>}
                        </button>
                        <button
                          onClick={() => { setClarifyMode(null); setClarifyInput(""); }}
                          className="sm:ml-auto text-center text-xs text-anvil-400 hover:text-anvil-400 font-display transition-colors py-1">
                          Dismiss
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Action bar */}
                <div className="px-4 sm:px-6 py-3 sm:py-4 border-t border-anvil-800/30 flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 no-print">
                  <div className="font-display text-[11px] text-anvil-400">
                    {autoPilot ? (
                      <span className="flex items-center gap-2 text-forge-400">
                        <svg className="animate-spin h-3.5 w-3.5" viewBox="0 0 24 24">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" />
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                        </svg>
                        Auto-Pilot: {STAGES[activeStep - 1]?.label || "Complete"}
                      </span>
                    ) : activeStep >= TOTAL_STAGES && outputs.build ? (
                      <span className="flex items-center gap-2 text-green-500">
                        <CheckCircle size={14} /> Pipeline complete
                      </span>
                    ) : (
                      <span className="flex items-center gap-2">
                        <span className="text-forge-500">{activeStep}</span>
                        <span className="text-anvil-700">/</span>
                        <span>{TOTAL_STAGES}</span>
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-2">
                    {/* Auto-Pilot cancel button */}
                    {autoPilot && (
                      <button onClick={cancelAutoPilot}
                        className="flex items-center justify-center gap-2 px-4 py-3 rounded-xl font-display text-sm font-medium border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-all">
                        <X size={14} /> Cancel Auto-Pilot
                      </button>
                    )}
                    {/* Auto-Pilot start button — only at intake stage */}
                    {!autoPilot && viewStep === activeStep && activeStep === 1 && outputs.intake.trim().length > 0 && !isProcessing && (
                      <button onClick={runAutoPilot}
                        className="flex items-center justify-center gap-2.5 px-5 sm:px-6 py-3 rounded-xl font-display text-sm font-semibold tracking-tight transition-all duration-300 border border-forge-500/30 text-forge-400 hover:bg-forge-500/10 hover:border-forge-500/50">
                        <Zap size={16} /> Auto-Pilot
                      </button>
                    )}
                    {/* Standard generate button */}
                    {!autoPilot && viewStep === activeStep && activeStep < TOTAL_STAGES && currentStage.key !== "build" && (
                      <button
                        disabled={!canGenerate || isProcessing}
                        onClick={generateNextStep}
                        className={`flex items-center justify-center gap-2.5 px-5 sm:px-6 py-3 rounded-xl font-display text-sm font-semibold tracking-tight transition-all duration-300
                          ${canGenerate && !isProcessing
                            ? "bg-gradient-to-r from-forge-600 to-forge-500 text-anvil-950 hover:from-forge-500 hover:to-forge-400 forge-glow cursor-pointer"
                            : "bg-anvil-800/50 text-anvil-400 cursor-not-allowed"
                          }`}
                      >
                        {isProcessing ? (
                          <>
                            <span className="forge-flame" />
                            <span className="forge-pulse">Forging...</span>
                          </>
                        ) : (
                          <>
                            Generate {STAGES[activeStep]?.label}
                            <ArrowRight size={16} />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>

              {/* Previous Outputs */}
              {activeStep > 1 && viewStep === activeStep && (
                <div className="space-y-3">
                  <div className="font-display text-[10px] font-bold text-anvil-400 uppercase tracking-[0.2em]">Previous Outputs</div>
                  {STAGES.slice(0, activeStep - 1).map(s => (
                    outputs[s.key] && (
                      <details key={s.id} className="glass rounded-xl group">
                        <summary className="px-5 py-3 cursor-pointer text-sm font-medium text-anvil-400 hover:text-anvil-200 flex items-center gap-3 transition-colors">
                          <CheckCircle className="text-green-500" size={14} />
                          <span className="font-display text-[10px] text-anvil-400">{s.num}</span>
                          <span>{s.label}</span>
                        </summary>
                        <div className="px-5 pb-5 border-t border-anvil-800/30 pt-4">
                          <MarkdownView content={outputs[s.key]} />
                        </div>
                      </details>
                    )
                  ))}
                </div>
              )}

              {/* Integrations Panel */}
              {activeStep >= 3 && outputs.prd && (
                <IntegrationsPanel outputs={outputs} activeStep={activeStep} onJellyfishData={setJellyfishContext} jellyfishContext={jellyfishContext} />
              )}
            </main>
          </div>

          {showRuns && <SavedRunsPanel onLoad={loadRun} onClose={() => setShowRuns(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AIWorkflowApp />);
  </script>
</body>
</html>
